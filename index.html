---
layout: default
title: Home
---

<div class="container">
  <section id="articles">
    {% for post in site.posts %}
    <article class="card">
      <a href="{{ post.url }}">
      <img src="{{ site.baseurl }}/assets/img/photo1.jpg" alt="" /></a>

      <p class="small-text">
        {{ post.date | date:"%d %B %Y" }}
      </p>
      <a href="{{ post.url }}"
        ><h2>
          {{ post.title }}
        </h2></a
      >
    </article>
    {% endfor %}
  </section>
</div>
